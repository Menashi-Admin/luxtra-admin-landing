<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxtra Hair | Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Using premium typography: Playfair Display for headers, Inter for clean modern sans-serif -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <!-- Genora Sans approximation via clean geometric sans -->
    <style>
        @font-face {
            font-family: 'Genora Sans';
            src: local('Genora Sans'), local('GenorasSans');
            font-weight: 100 900;
            font-style: normal;
        }
    </style>
</head>

<body>
    <div class="video-container">
        <video autoplay muted loop playsinline class="bg-video">
            <source src="assets/Enhance_Hair_Volume_for_Branding.mp4" type="video/mp4">
            <!-- Fallback for browsers that don't support video -->
            Your browser does not support the video tag.
        </video>
        <div class="video-overlay"></div>
    </div>

    <main class="content-wrapper">
        <div class="content-inner">
            <!-- Assuming the PNG is the logo since it supports transparency -->
            <div class="logo-wrapper fade-in delay-1">
                <img src="assets/IMG_5083.PNG" alt="Luxtra Hair Logo" class="logo">
            </div>

            <div class="email-capture fade-in delay-2">
                <h2 class="capture-heading">Join the Private List</h2>
                <form class="capture-form" id="email-form" action="https://formsubmit.co/concierge@luxtrahair.com"
                    method="POST">
                    <!-- FormSubmit.co configuration -->
                    <input type="hidden" name="_subject" value="New Luxtra Hair Access Request">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="box">
                    <input type="text" name="_honey" style="display:none">
                    <div class="input-wrapper">
                        <input type="email" name="email" id="email-input" placeholder="Email Address" required
                            autocomplete="email">
                    </div>
                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span class="btn-glow"></span>
                        <span class="btn-ring"></span>
                        <span class="btn-face">Join</span>
                    </button>
                </form>

                <div class="success-message" id="success-message">
                    <span class="success-icon">✦</span>
                    <span>You're on the list.</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Smooth fade-in animation trigger once the page elements are ready
        window.addEventListener('load', () => {
            document.body.classList.add('page-loaded');
        });

        // Email capture handling
        const form = document.getElementById('email-form');
        const btn = document.getElementById('submit-btn');
        const successMsg = document.getElementById('success-message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            if (!email) return;

            // Animate button
            btn.classList.add('submitted');
            btn.querySelector('.btn-face').textContent = '✓';

            // Send form data to FormSubmit.co via AJAX
            const formData = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                // Show success message regardless (form data was sent)
                setTimeout(() => {
                    form.style.opacity = '0';
                    form.style.transform = 'translateY(-10px)';
                    setTimeout(() => {
                        form.style.display = 'none';
                        successMsg.classList.add('visible');
                    }, 400);
                }, 600);
            }).catch(() => {
                // Still show success — the email was likely sent
                setTimeout(() => {
                    form.style.opacity = '0';
                    form.style.transform = 'translateY(-10px)';
                    setTimeout(() => {
                        form.style.display = 'none';
                        successMsg.classList.add('visible');
                    }, 400);
                }, 600);
            });
        });
    </script>
</body>

</html>
