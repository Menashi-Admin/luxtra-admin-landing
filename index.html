<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxtra Hair | A Modern Hair Maison</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Using premium typography: Playfair Display for headers, Inter for clean modern sans-serif -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <!-- Genora Sans approximation via clean geometric sans -->
    <style>
        @font-face {
            font-family: 'Genora Sans';
            src: local('Genora Sans'), local('GenorasSans');
            font-weight: 100 900;
            font-style: normal;
        }
    </style>
</head>

<body>
    <div class="video-container">
        <video autoplay muted loop playsinline class="bg-video">
            <source src="assets/Enhance_Hair_Volume_for_Branding.mp4" type="video/mp4">
            <!-- Fallback for browsers that don't support video -->
            Your browser does not support the video tag.
        </video>
        <div class="video-overlay"></div>
    </div>

    <main class="content-wrapper">
        <div class="content-inner">
            <!-- Logo + Tagline -->
            <div class="brand-header fade-in delay-1">
                <div class="logo-wrapper">
                    <img src="assets/IMG_5083.PNG" alt="Luxtra Hair Logo" class="logo">
                </div>
                <p class="brand-tagline">A Modern Hair Maison</p>
            </div>

            <div class="email-capture fade-in delay-2">
                <h2 class="capture-heading">JOIN THE LUXTRA PRIVATE LIST</h2>
                <form class="capture-form" id="email-form" action="https://formsubmit.co/concierge@luxtrahair.com"
                    method="POST">
                    <!-- FormSubmit.co configuration -->
                    <input type="hidden" name="_subject" value="New Luxtra Hair Access Request">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="box">
                    <input type="text" name="_honey" style="display:none">
                    <div class="input-wrapper">
                        <input type="email" name="email" id="email-input" placeholder="Email" required
                            autocomplete="email">
                    </div>
                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span class="btn-glow"></span>
                        <span class="btn-ring"></span>
                        <span class="btn-face">Request Access</span>
                    </button>
                </form>

                <p class="capture-disclaimer fade-in delay-3">Be among the first to experience LUXTRA.<br>Crafted in
                    limited releases.</p>

                <div class="success-message" id="success-message">
                    <!-- Gold light burst behind everything -->
                    <div class="success-burst"></div>
                    <!-- Floating gold particles -->
                    <div class="gold-particle p1"></div>
                    <div class="gold-particle p2"></div>
                    <div class="gold-particle p3"></div>
                    <div class="gold-particle p4"></div>
                    <div class="gold-particle p5"></div>
                    <div class="gold-particle p6"></div>
                    <!-- Confirmation text -->
                    <span class="success-text">You're on the list.</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer fade-in delay-3">
        <span>&copy; LUXTRA</span>
    </footer>

    <script>
        // Smooth fade-in animation trigger once the page elements are ready
        window.addEventListener('load', () => {
            document.body.classList.add('page-loaded');
        });

        // Email capture handling
        const form = document.getElementById('email-form');
        const btn = document.getElementById('submit-btn');
        const successMsg = document.getElementById('success-message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            if (!email) return;

            // Stage 1: Gold shimmer on button
            btn.classList.add('shimmer-active');
            btn.querySelector('.btn-face').textContent = '✓';

            // Send form data to FormSubmit.co via AJAX
            const formData = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).then(() => {}).catch(() => {});

            // Stage 2: Fade out form after shimmer
            setTimeout(() => {
                btn.classList.add('submitted');
                form.style.opacity = '0';
                form.style.transform = 'translateY(-15px) scale(0.98)';
                // Also fade out the disclaimer
                const disclaimer = document.querySelector('.capture-disclaimer');
                if (disclaimer) {
                    disclaimer.style.opacity = '0';
                    disclaimer.style.transform = 'translateY(-10px)';
                    disclaimer.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                }
                // Also fade out the heading
                const heading = document.querySelector('.capture-heading');
                if (heading) {
                    heading.style.opacity = '0';
                    heading.style.transform = 'translateY(-10px)';
                    heading.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                }

                // Stage 3: Grand reveal
                setTimeout(() => {
                    form.style.display = 'none';
                    if (disclaimer) disclaimer.style.display = 'none';
                    if (heading) heading.style.display = 'none';
                    successMsg.classList.add('visible');
                }, 600);
            }, 800);
        });
    </script>
</body>

</html>
